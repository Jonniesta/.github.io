<!-- CONTACT SECTION -->
<section class="contact-section">

  <div class="contact-box">

    <span class="contact-tag">CONTACT</span>

    <h2>Let’s Connect</h2>

    <p>
      Whether you want to collaborate, ask a question,
      or simply connect — I’d love to hear from you.
    </p>

    <!-- QUICK LINKS -->
    <div class="contact-info">

      <a href="mailto:jonniesta@gmail.com">
        📧 Email Me
      </a>

      <a href="tel:+13172134147">
        📱 Call / Text
      </a>


    </div>

    <!-- SOCIAL LINKS -->
    <div class="social-links">

      <a href="https://linkedin.com/in/jonny-calderon" target="_blank">
        LinkedIn
      </a>

      <a href="https://github.com/Jonniesta" target="_blank">
        GitHub
      </a>

    </div>

    <!-- CONTACT FORM -->
    <form action="https://formspree.io/f/mbjpalvn" method="POST">

      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
      >

      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
      >

      <textarea
        name="message"
        placeholder="Your Message"
        rows="6"
        required
      ></textarea>

      <button type="submit">
        Send Message
      </button>

    </form>

  </div>

</section>

<!-- FOOTER -->
<footer>

</footer>
