<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Jonny Calderon</title>

  <!-- SEO -->
  <meta
    name="description"
    content="Contact Jonny Calderon for collaborations, creative work, photography, and professional opportunities."
  />

  <!-- THEME -->
  <meta name="theme-color" content="#040816" />

  <!-- STYLES -->
  <link rel="stylesheet" href="styles.css">

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

  <!-- NAV -->
  <nav>

    <a href="index.html" class="logo">
      <img src="gjc.png" alt="Jonny Calderon Logo">
    </a>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="photography.html">Photography</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>

  </nav>

  <!-- CONTACT -->
  <section class="contact-section">

    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>

    <div class="contact-box">

      <!-- HEADER -->
      <div class="contact-header">

        <h2>Let’s Connect</h2>

        <div class="contact-line"></div>

        <p>
          Whether you want to collaborate, ask a question, or work together — I’d love to hear from you.
        </p>

      </div>

      <!-- CONTACT INFO -->
      <div class="contact-info-bar">

        <a href="mailto:jonniesta@gmail.com">
          <i class="fa-solid fa-envelope"></i>
          <span>Email</span>
        </a>

        <a href="tel:+13172134147">
          <i class="fa-solid fa-phone"></i>
          <span>Call</span>
        </a>

        <a href="https://linkedin.com/in/jonny-calderon" target="_blank">
          <i class="fa-brands fa-linkedin"></i>
          <span>LinkedIn</span>
        </a>

        <a href="https://github.com/Jonniesta" target="_blank">
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </a>

      </div>

      <!-- FORM -->
      <form
        action="https://formspree.io/f/mbjpalvn"
        method="POST"
        class="contact-form"
      >

        <!-- ✅ FIXED REDIRECT (THIS IS THE IMPORTANT PART) -->
      <input type="hidden" name="_next" value="success.html">

        <!-- SUBJECT -->
        <input
          type="hidden"
          name="_subject"
          value="New Portfolio Contact Message"
        >

        <!-- NAME -->
        <div class="input-group">
          <label>Your Name</label>
          <input type="text" name="name" required>
        </div>

        <!-- EMAIL -->
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" name="email" required>
        </div>

        <!-- MESSAGE -->
        <div class="input-group">
          <label>Message</label>
          <textarea name="message" rows="7" required></textarea>
        </div>

        <!-- SUBMIT -->
        <button type="submit">
          Send Message
          <i class="fa-solid fa-arrow-right"></i>
        </button>

      </form>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Jonny Calderon
  </footer>

  <!-- NAV SCRIPT -->
  <script>
    window.addEventListener("scroll", () => {
      document.querySelector("nav")
        .classList.toggle("scrolled", window.scrollY > 20);
    });
  </script>

</body>
</html>
