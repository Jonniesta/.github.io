<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Jonny Calderon</title>

  <meta name="description" content="Contact Jonny Calderon for collaborations, creative work, photography, and opportunities." />

  <meta name="theme-color" content="#040816" />

  <link rel="stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

  <!-- NAV -->
  <nav>

    <a href="index.html" class="logo">
      <img src="gjc.png" alt="Logo">
    </a>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="photography.html">Photography</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>

  </nav>

  <!-- CONTACT SECTION -->
  <section class="contact-section">

    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>

    <div class="contact-box">

      <div class="contact-header">
        <h2>Let’s Connect</h2>
        <div class="contact-line"></div>
        <p>Send a message and I’ll respond as soon as possible.</p>
      </div>

      <!-- CONTACT LINKS -->
      <div class="contact-info-bar">

        <a href="mailto:jonniesta@gmail.com">
          <i class="fa-solid fa-envelope"></i>
          <span>Email</span>
        </a>

        <a href="tel:+13172134147">
          <i class="fa-solid fa-phone"></i>
          <span>Call</span>
        </a>

        <a href="https://linkedin.com/in/jonny-calderon" target="_blank">
          <i class="fa-brands fa-linkedin"></i>
          <span>LinkedIn</span>
        </a>

        <a href="https://github.com/Jonniesta" target="_blank">
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </a>

      </div>

      <!-- FORM -->
      <form
        id="contactForm"
        action="https://formspree.io/f/mbjpalvn"
        method="POST"
        class="contact-form"
      >

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <textarea name="message" rows="7" placeholder="Your Message" required></textarea>

        <button type="submit" id="submitBtn">
          Send Message
          <i class="fa-solid fa-arrow-right"></i>
        </button>

      </form>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Jonny Calderon
  </footer>

  <!-- REDIRECT SCRIPT (WORKING) -->
  <script>
    const form = document.getElementById("contactForm");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btn.disabled = true;
      btn.innerHTML = "Sending...";

      const formData = new FormData(form);

      try {
        const res = await fetch("https://formspree.io/f/mbjpalvn", {
          method: "POST",
          body: formData,
          headers: {
            "Accept": "application/json"
          }
        });

        if (res.ok) {
          window.location.href = "success.html";
        } else {
          btn.innerHTML = "Try Again";
          btn.disabled = false;
        }

      } catch (err) {
        btn.innerHTML = "Error - Try Again";
        btn.disabled = false;
      }
    });
  </script>

</body>

</html>
