<!-- =========================
     CONTACT SECTION
========================= -->
<section class="contact-section reveal">

  <div class="contact-box">

    <span class="section-tag">
      CONTACT
    </span>

    <h1>
      Let’s Connect
    </h1>

    <p>
      Open to conversations, collaboration,
      and creative opportunities.
    </p>

    <!-- FORMSPREE -->
    <form
      action="https://formspree.io/f/mbjpalvn"
      method="POST"
    >

      <!-- subject -->
      <input
        type="hidden"
        name="_subject"
        value="New Portfolio Message"
      >

      <!-- IMPORTANT FIX -->
      <!-- replace with your REAL domain -->
      <input
        type="hidden"
        name="_next"
        value="https://yourdomain.com/success.html"
      >

      <!-- name -->
      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
      >

      <!-- email -->
      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
      >

      <!-- message -->
      <textarea
        name="message"
        placeholder="Your Message"
        required
      ></textarea>

      <!-- button -->
      <button type="submit">
        Send Message
      </button>

    </form>

  </div>

</section>

     FOOTER
========================= -->
