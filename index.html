<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Landing Page</title>
<link rel="stylesheet" href="styles.css" />
<!-- Optional Google Fonts -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans&display=swap" rel="stylesheet" />
</head>
<body>

<!-- Navbar -->
<header id="navbar">
  <div class="container">
    <h1 class="nav-title">My Portfolio</h1>
  </div>
</header>

<!-- Landing Section -->
<section class="landing">
  <div class="container">
    <img src="me.png" alt="My Photo" class="profile-pic" />
    <h2 class="name">Your Name</h2>
  </div>
</section>

<!-- About Me Section -->
<section id="about" class="about-me">
  <div class="container">
    <h2>About Me</h2>
    <p>Hello! I'm [Your Name], a passionate developer with expertise in web development, design, and creating engaging user experiences. Welcome to my portfolio!</p>
  </div>
</section>

<!-- Scripts for scroll effects -->
<script>
  const navbar = document.getElementById('navbar');

  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      navbar.classList.add('scrolled');
    } else {
      navbar.classList.remove('scrolled');
    }
  });
</script>

</body>
</html>
