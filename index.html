<!-- Aurora and stars animation script -->
<script>
const canvas = document.getElementById('background-canvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

window.addEventListener('resize', () => {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
});

// Stars setup
const starsCount = 150;
const stars = [];
for (let i = 0; i < starsCount; i++) {
    stars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() * 1.5,
        opacity: Math.random(),
        delta: Math.random() * 0.02,
    });
}

// Aurora setup
const auroraWavesCount = 3;
const auroraWaves = [];
for (let i = 0; i < auroraWavesCount; i++) {
    auroraWaves.push({
        amplitude: Math.random() * 50 + 50,
        wavelength: Math.random() * 200 + 200,
        speed: Math.random() * 0.002 + 0.001,
        phase: Math.random() * Math.PI * 2,
        yOffset: Math.random() * height * 0.5 + height * 0.2,
        color: `hsla(${120 + i * 30}, 100%, 50%, 0.3)`,
    });
}

function animate() {
    ctx.clearRect(0, 0, width, height);

    // Draw stars
    for (const star of stars) {
        ctx.globalAlpha = star.opacity;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();

        star.opacity += star.delta;
        if (star.opacity <= 0 || star.opacity >= 1) {
            star.delta = -star.delta;
        }
    }

    ctx.globalAlpha = 1;

    // Draw aurora waves
    for (const wave of auroraWaves) {
        ctx.beginPath();
        ctx.moveTo(0, wave.yOffset);
        for (let x = 0; x <= width; x += 10) {
            const y = wave.yOffset + Math.sin(x / wave.wavelength + wave.phase) * wave.amplitude;
            ctx.lineTo(x, y);
        }
        ctx.strokeStyle = wave.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        wave.phase += wave.speed;
    }

    requestAnimationFrame(animate);
}
animate();

// Handle resize
window.addEventListener('resize', () => {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
});
</script>
<!-- Script for hamburger menu toggling -->

hamburger.addEventListener('click', () => {

});
</script>
