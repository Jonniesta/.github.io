<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Landing Page</title>
<link rel="stylesheet" href="styles.css" />
<!-- Optional Google Fonts -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans&display=swap" rel="stylesheet" />
</head>
<body>

<!-- Navbar -->
<header id="navbar">
  <div class="container" style="display:flex; justify-content: space-between; align-items: center; width: 100%;">
    <!-- Left side: Logo -->
    <div class="nav-left">
      <div class="logo"></div> <!-- Placeholder for logo image -->
    </div>
    <!-- Right side: Navigation links -->
    <nav class="nav-links">
      <a href="#projects">Projects</a>
      <a href="#photography">Photography</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<!-- Landing Section -->
<section class="landing">
  <div class="container" style="text-align: center; padding: 50px 20px;">
    <img src="me.png" alt="My Photo" class="profile-pic" />
    <h2 class="name">Jonny Calderon</h2>
  </div>
</section>

<!-- About Me Section -->
<section id="about" class="about-me" style="padding: 50px 20px;">
  <div class="container">
    <h2>About Me</h2>
    <p>Hello! I'm Jonny, a passionate developer with expertise in web development, design, and creating engaging user experiences. Welcome to my portfolio!</p>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Jonny Calderon. All rights reserved.</p>
</footer>

<!-- Scripts for scroll effects -->
<script>
  const navbar = document.getElementById('navbar');

  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      navbar.classList.add('scrolled');
    } else {
      navbar.classList.remove('scrolled');
    }
  });
</script>

</body>
</html>
